<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <span class="header-title">Learn</span>
        <select id="subject-select" class="subject-select"></select>
      </div>
      <div class="header-right">
        <span id="streak-display" class="streak"></span>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="progress">Progress</button>
      <button class="tab" data-tab="topics">Topics</button>
      <button class="tab" data-tab="sessions">Sessions</button>
      <button class="tab" data-tab="methods">Methods</button>
    </nav>

    <main class="main">
      <div id="view-progress" class="view"></div>
      <div id="view-topics" class="view hidden">
        <div class="search-bar">
          <div style="display:flex;align-items:center;gap:10px">
            <input id="topic-search" class="search-input" type="text" placeholder="Search topics…" autocomplete="off" style="flex:1" />
            <span id="topics-count" style="font-size:13px;color:var(--text-faint);white-space:nowrap"></span>
          </div>
          <div class="search-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="beginner">Beginner</button>
            <button class="filter-btn" data-filter="junior">Junior</button>
            <button class="filter-btn" data-filter="middle">Middle</button>
            <button class="filter-btn" data-filter="senior">Senior</button>
            <button class="filter-btn" data-filter="principal">Principal</button>
          </div>
        </div>
        <div id="topics-list"></div>
      </div>
      <div id="view-methods" class="view hidden"></div>
      <div id="view-sessions" class="view hidden"></div>
    </main>
  </div>

  <div id="heatmap-tip" class="heatmap-tip"></div>

  <div id="panel-overlay" class="panel-overlay hidden" role="dialog">
    <div class="panel-overlay-bg" onclick="closePanel()"></div>
    <div id="panel" class="panel"></div>
  </div>

  <script src="data.js"></script>
  <script src="helpers.js"></script>
  <script src="app.js"></script>
</body>
</html>
